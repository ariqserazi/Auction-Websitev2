services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: threadline_marketplace
      MYSQL_USER: threadline
      MYSQL_PASSWORD: threadline
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    depends_on:
      - mysql
    environment:
      DB_URL: jdbc:mysql://mysql:3306/threadline_marketplace?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: threadline
      DB_PASSWORD: threadline
      JWT_SECRET: compose-demo-secret-compose-demo-secret
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://frontend:4173
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://backend:8080/api
    ports:
      - "4173:4173"

volumes:
  mysql_data:
